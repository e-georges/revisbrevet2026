<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RévisSeconde Studio Pro</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>

  <div class="app-container">
    
    <main class="main-content">
      
      <section id="home-screen">
        <div class="mobile-header">
          <span style="font-size: 0.75rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase;">Objectif Lycée</span>
          <h1 style="margin: 0; font-size: 1.4rem; font-weight: 800;">Mon Programme Seconde</h1>
        </div>
        <div id="matieres-container"></div>
      </section>

      <section id="pre-quiz-screen" style="display: none;">
        <button onclick="goHome()" style="background: none; border: none; color: var(--color-primary); font-weight: 700; cursor: pointer; margin-bottom: 16px; padding: 0; font-size: 0.9rem;">⬅️ Retour au programme</button>
        
        <div style="margin-bottom: 20px;">
          <span id="chapter-matiere-badge" class="badge-theme">Matière</span>
          <h2 id="pre-quiz-title" style="margin: 6px 0 0 0; font-size: 1.3rem; font-weight: 800;">Titre du Chapitre</h2>
        </div>
        
        <div style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px;">
          <button id="btn-sub-summary" class="btn-primary" onclick="switchChapterSubView('view-summary')">📝 Résumé & Fondamentaux</button>
          <button id="btn-sub-exercises" class="btn-success" onclick="switchChapterSubView('view-exercises')">🎯 Exercices de Révision</button>
          <button class="btn-secondary" onclick="preparerModificationChapitre()">✏️ Modifier / Enrichir le chapitre</button>
        </div>

        <div id="sub-view-summary" class="chapter-sub-view">
          <div class="card">
            <h4 style="margin: 0 0 8px 0; font-size: 0.8rem; color: var(--color-primary); text-transform: uppercase;">Notes & Synthèse du cours</h4>
            <p id="pre-quiz-cours-text" style="margin: 0; font-size: 0.9rem; line-height: 1.5; white-space: pre-line; color: var(--text-primary);"></p>
          </div>
          <div id="wrapper-piege" class="card" style="background: #FFF5F5; border-color: #FED7D7;">
            <h4 style="margin: 0 0 6px 0; font-size: 0.8rem; color: #C53030; text-transform: uppercase;">Piège classique</h4>
            <p id="pre-quiz-piege-text" style="margin: 0; font-size: 0.85rem; color: #9B1C1C;"></p>
          </div>
        </div>

        <div id="sub-view-exercises" class="chapter-sub-view" style="display:none;">
          <div class="card" style="border-left: 4px solid var(--color-success);">
            <h4 style="margin: 0 0 6px 0; font-size: 0.8rem; color: var(--color-success); text-transform: uppercase;">Auto-Évaluation Automatique</h4>
            <p style="margin: 0 0 12px 0; font-size: 0.85rem; color: var(--text-secondary);">Entraîne-toi à restituer les fondamentaux de ce chapitre. Réponds de tête puis vérifie.</p>
            <button class="btn-primary" style="background: var(--color-success); min-height: 38px; font-size: 0.82rem;" onclick="genererQuizFlash()">Générer une question Flash</button>
            
            <div id="box-quiz-flash" style="margin-top: 14px; padding-top: 12px; border-top: 1px dashed var(--border-color); display: none;">
              <p id="text-quiz-question" style="font-weight: 700; font-size: 0.9rem; margin: 0 0 12px 0; color: var(--text-primary);"></p>
              <button class="btn-secondary" id="btn-reveal-flash" style="min-height: 32px; font-size: 0.75rem;">👁️ Vérifier la réponse</button>
              <p id="text-quiz-reponse" style="margin: 12px 0 0 0; font-size: 0.85rem; background: #F1F5F9; padding: 12px; border-radius: 8px; display: none; white-space: pre-line; line-height: 1.4; color: var(--text-primary);"></p>
            </div>
          </div>
        </div>
      </section>

    </main>

    <div id="modal-add-chapter" class="modal-backdrop" style="display: none;">
      <div class="modal-window">
        <div class="tabs-header">
          <button class="tab-btn active" onclick="switchIngestTab('tab-text')">✍️ Saisie</button>
          <button class="tab-btn" onclick="switchIngestTab('tab-photo')">📸 Photo</button>
          <button class="tab-btn" onclick="switchIngestTab('tab-link')">🔗 Lien Web</button>
        </div>

        <div style="padding: 16px 16px 0 16px;">
          <label style="font-size: 0.72rem; font-weight: 700; color: var(--text-secondary); display: block; margin-bottom: 4px; text-transform: uppercase;">Nom du chapitre</label>
          <input type="text" id="input-new-chap-title" class="input-field" placeholder="Ex: Généralités sur les fonctions">
        </div>

        <div id="tab-text" class="tab-content" style="display: block;">
          <label style="font-size: 0.72rem; font-weight: 700; color: var(--text-secondary); display: block; margin-bottom: 4px; text-transform: uppercase;">Contenu ou notes de révision</label>
          <textarea id="area-ingest-text" class="input-field" style="height: 120px; resize: none;" placeholder="Écris, colle ton cours, tes définitions ou résumés ici..."></textarea>
        </div>

        <div id="tab-photo" class="tab-content" style="display: none;">
          <div class="file-dropzone" onclick="$('file-camera-input').click()">
            <span style="font-size: 1.6rem; display: block; margin-bottom: 4px;">📷</span>
            <span style="font-size: 0.75rem; color: var(--text-secondary); font-weight: 600; display: block;">Scanner une page de cours / cahier</span>
            <input type="file" id="file-camera-input" accept="image/*" style="display: none;">
          </div>
          <div id="ocr-status-container" style="display: none; flex-direction: column; align-items: center; gap: 6px; margin-top: 12px;">
            <div class="spinner"></div>
            <span style="font-size: 0.72rem; font-weight: 700; color: var(--color-primary);">Numérisation de l'image (OCR)...</span>
          </div>
        </div>

        <div id="tab-link" class="tab-content" style="display: none;">
          <label style="font-size: 0.72rem; font-weight: 700; color: var(--text-secondary); display: block; margin-bottom: 4px; text-transform: uppercase;">URL de référence</label>
          <input type="url" id="input-ingest-url" class="input-field" placeholder="https://mon-site-de-cours.fr/chapitre1">
        </div>

        <div style="padding: 0 16px 16px 16px; display: flex; gap: 10px;">
          <button class="btn-secondary" style="min-height: 40px;" onclick="closeAddChapterModal()">Annuler</button>
          <button id="btn-submit-new-chap" class="btn-primary" style="min-height: 40px;">Enregistrer</button>
        </div>
      </div>
    </div>

    <nav class="bottom-nav">
      <button id="nav-home" class="nav-item">🏠 Menu Principal</button>
    </nav>

  </div>

  <script src="app.js"></script>
</body>
</html>
